<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Protocol Not Found | STACKLY</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #1a1a3a 0%, #050505 100%);
            color: #fff;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
        }

        .error-container {
            text-align: center;
            position: relative;
            z-index: 1;
            padding: 40px;
            max-width: 600px;
        }

        .glitch-wrapper {
            position: relative;
            display: inline-block;
        }

        .error-code {
            font-size: 10rem;
            font-weight: 800;
            margin: 0;
            line-height: 1;
            background: linear-gradient(135deg, #00f2fe 0%, #7048e8 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }

        .error-message {
            font-size: 1.5rem;
            color: var(--accent-color);
            margin: 20px 0;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        .error-desc {
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .btn-home {
            display: inline-block;
            padding: 15px 40px;
            background: linear-gradient(135deg, #3b5bdb, #7048e8);
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            box-shadow: 0 10px 20px rgba(112, 72, 232, 0.3);
            transition: all 0.3s ease;
        }

        .btn-home:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(112, 72, 232, 0.5);
        }

        .particle {
            position: absolute;
            background: rgba(0, 242, 254, 0.2);
            border-radius: 50%;
            pointer-events: none;
            animation: float 20s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(-1000px) rotate(720deg); opacity: 0; }
        }

        #bg-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <div class="error-container">
        <div class="glitch-wrapper">
            <h1 class="error-code">404</h1>
        </div>
        <div class="error-message">Protocol De-indexed</div>
        <p class="error-desc">
            The neural path you are attempting to access has been archived or does not exist in the current grid. 
            Re-establishing hub connection is recommended.
        </p>
        <a href="index.html" class="btn-home">Return to Hub</a>
    </div>

    <script src="script.js"></script>
    <script>
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        const particles = [];
        for (let i = 0; i < 50; i++) {
            particles.push({
                x: Math.random() * width,
                y: Math.random() * height,
                size: Math.random() * 2 + 1,
                speedX: (Math.random() - 0.5) * 0.5,
                speedY: (Math.random() - 0.5) * 0.5
            });
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = 'rgba(0, 242, 254, 0.3)';
            
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                
                p.x += p.speedX;
                p.y += p.speedY;
                
                if (p.x < 0) p.x = width;
                if (p.x > width) p.x = 0;
                if (p.y < 0) p.y = height;
                if (p.y > height) p.y = 0;
            });
            
            requestAnimationFrame(draw);
        }
        draw();
    </script>

    <!-- Success Toast -->
    <div id="auth-toast" style="
        position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(80px);
        background:linear-gradient(135deg,#00c853,#00e676); color:#000;
        padding:14px 28px; border-radius:50px; font-weight:700; font-size:0.9rem;
        box-shadow:0 8px 25px rgba(0,200,83,0.4); z-index:99999;
        opacity:0; transition:all 0.4s cubic-bezier(0.4,0,0.2,1); white-space:nowrap;
    ">✅ Hub synchronization successful!</div>
</body>
</html>
